<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shield/Home shape -->
  <path d="M50 8 C68 8, 85 16, 85 36 C85 64, 50 88, 50 88 C50 88, 15 64, 15 36 C15 16, 32 8, 50 8 Z" fill="url(#logo-grad)" />
  <!-- Inner Home outline -->
  <path d="M50 24 L72 44 L64 44 L64 68 L36 68 L36 44 L28 44 Z" fill="#ffffff" opacity="0.95" />
  <!-- Door shape -->
  <path d="M45 54 L55 54 L55 68 L45 68 Z" fill="url(#logo-grad)" />
  <!-- Sparkles -->
  <path d="M72 16 L74 21 L79 21 L75 24 L76 29 L72 26 L68 29 L69 24 L65 21 L70 21 Z" fill="#facc15" filter="url(#glow)" />
</svg>
